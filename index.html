<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Birthday List</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { color: #5c67f2; text-align: center; }
        input { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { background: #5c67f2; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600; transition: 0.3s; margin-top: 5px; }
        button:hover { background: #4a54e1; }
        .secondary-btn { background: #e4e6eb; color: #050505; margin-top: 15px; }
        .secondary-btn:hover { background: #d8dadf; }
        .item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .item:last-child { border-bottom: none; }
        .bought { text-decoration: line-through; color: #888; opacity: 0.6; }
        .id-badge { background: #5c67f2; color: white; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
        .delete-btn { background: #ff4d4d; width: auto; padding: 5px 10px; margin-left: 10px; font-size: 12px; }
        .buy-btn { background: #28a745; width: auto; font-size: 12px; }
        a { color: #5c67f2; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🎂 Birthday Registry</h2>
        
        <div id="setup-section">
            <button onclick="createNewList()">✨ Create a Brand New List</button>
            <div style="text-align:center; margin: 20px 0; color: #888;">— OR —</div>
            <input type="text" id="find-id" placeholder="Enter a Friend's List ID">
            <button class="secondary-btn" onclick="loadList(document.getElementById('find-id').value)">View Their List</button>
        </div>

        <div id="list-section" style="display:none;">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3>List ID: <span id="current-id" class="id-badge"></span></h3>
                <button style="width:auto; padding: 5px;" onclick="location.reload()">Back</button>
            </div>
            
            <div id="items-container"></div>
            
            <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">
            
            <h4>➕ Add to your list</h4>
            <input type="text" id="item-name" placeholder="Gift Name">
            <input type="text" id="item-price" placeholder="Price (optional)">
            <input type="text" id="item-link" placeholder="Website Link (optional)">
            <button onclick="promptAddItem()">Add Item (Password Required)</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION: ADD YOUR STUFF HERE ---
        
        // LINE 73: PASTE YOUR PROJECT URL INSIDE THE QUOTES
        const SUPABASE_URL = 'https://svhwpscnnxqwmzhmcqda.supabase.co/'; 
        
        // LINE 76: PASTE YOUR ANON KEY (THE LONG ONE) INSIDE THE QUOTES
        const SUPABASE_KEY = 'sb_publishable_jTRYYEXlB-0h1SbUwvIejg_sRuM7Fsa'; 

        // --- END CONFIGURATION ---

        const { createClient } = supabase;
        const _supabase = createClient(https://svhwpscnnxqwmzhmcqda.supabase.co, sb_publishable_jTRYYEXlB-0h1SbUwvIejg_sRuM7Fsa);

        let currentListID = '';

        async function createNewList() {
            const password = prompt("Set a password for your list (you'll need this to add/delete items):");
            if (!password) return;

            // Generates a 6-character random ID
            const shareCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            const { error } = await _supabase
                .from('lists')
                .insert([{ share_code: shareCode, password_hash: password }]);

            if (error) {
                alert("Database Error: " + error.message);
            } else {
                alert("List Created! Share this ID with friends: " + shareCode);
                loadList(shareCode);
            }
        }

        async function loadList(id) {
            if (!id) return;
            currentListID = id.toUpperCase();
            
            // Find the list record
            const { data: listData, error: listError } = await _supabase
                .from('lists')
                .select('id')
                .eq('share_code', currentListID)
                .single();
            
            if (!listData) {
                alert("Couldn't find a list with that ID.");
                return;
            }

            // Get items for that list
            const { data: items, error: itemError } = await _supabase
                .from('items')
                .select('*')
                .eq('list_id', listData.id)
                .order('created_at', { ascending: false });
            
            // UI Toggle
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('list-section').style.display = 'block';
            document.getElementById('current-id').innerText = currentListID;
            
            const container = document.getElementById('items-container');
            container.innerHTML = items.length ? '' : '<p style="color:#888;">List is currently empty.</p>';
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="${item.is_bought ? 'bought' : ''}">
                        <strong>${item.name}</strong> ${item.price ? '- $' + item.price : ''} <br>
                        ${item.link ? `<a href="${item.link}" target="_blank">View Item ↗</a>` : ''}
                    </div>
                    <div>
                        ${item.is_bought ? '<span>✅ Got it!</span>' : `<button class="buy-btn" onclick="markBought('${item.id}')">I bought this</button>`}
                        <button class="delete-btn" onclick="promptDelete('${item.id}')">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function promptAddItem() {
            const password = prompt("Enter list password to add item:");
            if (!password) return;

            const name = document.getElementById('item-name').value;
            const price = document.getElementById('item-price').value;
            const link = document.getElementById('item-link').value;

            if (!name) { alert("Please enter an item name."); return; }

            // Calls the SQL Function we made earlier
            const { error } = await _supabase.rpc('add_item_secure', {
                p_code: currentListID,
                p_pass: password,
                i_name: name,
                i_price: price,
                i_link: link
            });

            if (error) alert("Access Denied: " + error.message);
            else {
                // Clear fields and reload
                document.getElementById('item-name').value = '';
                document.getElementById('item-price').value = '';
                document.getElementById('item-link').value = '';
                loadList(currentListID);
            }
        }

        async function markBought(itemId) {
            if (!confirm("Mark this as bought? This lets others know but hides the item from the owner!")) return;
            await _supabase.from('items').update({ is_bought: true }).eq('id', itemId);
            loadList(currentListID);
        }

        async function promptDelete(itemId) {
            const password = prompt("Enter list password to delete:");
            if (!password) return;

            const { data } = await _supabase
                .from('lists')
                .select('id')
                .eq('share_code', currentListID)
                .eq('password_hash', password)
                .single();
            
            if (data) {
                await _supabase.from('items').delete().eq('id', itemId);
                loadList(currentListID);
            } else {
                alert("Incorrect password.");
            }
        }
    </script>
</body>
</html>
